
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
#app { display: flex; height: 620px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; }
#sidebar { width: 280px; flex-shrink: 0; border-right: 0.5px solid var(--color-border-tertiary); display: flex; flex-direction: column; }
#sidebar-header { padding: 16px; border-bottom: 0.5px solid var(--color-border-tertiary); }
#sidebar-header h1 { font-size: 13px; font-weight: 500; color: var(--color-text-secondary); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 4px; }
#sidebar-header h2 { font-size: 17px; font-weight: 500; color: var(--color-text-primary); }
#filter-row { padding: 10px 16px; border-bottom: 0.5px solid var(--color-border-tertiary); display: flex; gap: 6px; flex-wrap: wrap; }
.filter-btn { font-size: 11px; padding: 4px 10px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-secondary); cursor: pointer; transition: all 0.15s; }
.filter-btn.active { background: #1D9E75; color: #fff; border-color: #1D9E75; }
#object-list { flex: 1; overflow-y: auto; }
.object-item { padding: 12px 16px; border-bottom: 0.5px solid var(--color-border-tertiary); cursor: pointer; transition: background 0.1s; }
.object-item:hover, .object-item.selected { background: var(--color-background-secondary); }
.object-thumb { width: 48px; height: 48px; border-radius: 4px; object-fit: cover; background: var(--color-background-tertiary); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
.object-meta { flex: 1; min-width: 0; }
.object-name { font-size: 13px; font-weight: 500; color: var(--color-text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.object-sub { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }
.tag { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 10px; background: #E1F5EE; color: #0F6E56; margin-top: 4px; }
.tag.render { background: #EEEDFE; color: #3C3489; }
#map-area { flex: 1; position: relative; background: #f5f3ee; }
#map-svg { width: 100%; height: 100%; }
.state-path { fill: #d6cfc0; stroke: #fff; stroke-width: 1.5; cursor: pointer; transition: fill 0.15s; }
.state-path:hover { fill: #9FE1CB; }
.state-path.has-objects { fill: #5DCAA5; }
.state-path.highlighted { fill: #1D9E75; }
.connection-line { stroke: #7F77DD; stroke-width: 1.5; stroke-dasharray: 4 3; opacity: 0.7; fill: none; marker-end: url(#arrow); }
.dot { cursor: pointer; }
#info-panel { position: absolute; bottom: 0; left: 0; right: 0; background: var(--color-background-primary); border-top: 0.5px solid var(--color-border-tertiary); padding: 14px 18px; display: none; }
#info-panel.visible { display: block; }
#info-title { font-size: 15px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 2px; }
#info-sub { font-size: 12px; color: var(--color-text-secondary); }
#info-connection { font-size: 12px; color: #534AB7; margin-top: 6px; display: flex; align-items: center; gap: 6px; }
#legend { position: absolute; top: 12px; right: 14px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 10px 12px; font-size: 11px; color: var(--color-text-secondary); }
.legend-row { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; }
.legend-row:last-child { margin-bottom: 0; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }
.legend-line { width: 20px; height: 2px; background: #7F77DD; border-top: 2px dashed #7F77DD; }
</style>

<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">
      <h1>Index of American Design</h1>
      <h2>Speculative Portfolio</h2>
    </div>
    <div id="filter-row">
      <button class="filter-btn active" onclick="setFilter('all')">All</button>
      <button class="filter-btn" onclick="setFilter('textile')">Textile</button>
      <button class="filter-btn" onclick="setFilter('ceramic')">Ceramic</button>
      <button class="filter-btn" onclick="setFilter('furniture')">Furniture</button>
      <button class="filter-btn" onclick="setFilter('tool')">Tool</button>
    </div>
    <div id="object-list"></div>
  </div>
  <div id="map-area">
    <svg id="map-svg" viewBox="0 0 960 580" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrow" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
          <path d="M0,0 L0,6 L6,3 z" fill="#7F77DD" opacity="0.8"/>
        </marker>
      </defs>
      <g id="states-layer"></g>
      <g id="connections-layer"></g>
      <g id="dots-layer"></g>
    </svg>
    <div id="legend">
      <div class="legend-row"><div class="legend-dot" style="background:#5DCAA5"></div> Has objects</div>
      <div class="legend-row"><div class="legend-dot" style="background:#1D9E75"></div> Selected state</div>
      <div class="legend-row"><div class="legend-dot" style="background:#7F77DD"></div> Object origin</div>
      <div class="legend-row"><div class="legend-dot" style="background:#AFA9EC"></div> Renderer's origin</div>
      <div class="legend-row"><div class="legend-line"></div> Renderer → Object</div>
    </div>
    <div id="info-panel">
      <div id="info-title"></div>
      <div id="info-sub"></div>
      <div id="info-connection"></div>
    </div>
  </div>
</div>

<script>
const objects = [
  { id:1, name:"Shaker Chair", state:"MA", rendererState:"NY", type:"furniture", desc:"Woven tape seat, maple frame", renderer:"Lucile Chabot, New York", origin:"Hancock Shaker Village, MA", year:"1936" },
  { id:2, name:"Navajo Blanket", state:"NM", rendererState:"NM", type:"textile", desc:"Wool, vegetal dye, geometric pattern", renderer:"E. Boyd, Albuquerque NM", origin:"Northern New Mexico", year:"1939" },
  { id:3, name:"Pennsylvania Dutch Hex Sign", state:"PA", rendererState:"IL", type:"textile",desc:"Painted wood, folk motif", renderer:"Rudolph Ruzicka, Chicago IL", origin:"Lancaster County, PA", year:"1937" },
  { id:4, name:"Slip-glazed Jug", state:"NC", rendererState:"GA", type:"ceramic", desc:"Alkaline glaze, stoneware", renderer:"Dorothy Hay, Atlanta GA", origin:"Catawba Valley, NC", year:"1938" },
  { id:5, name:"Cigar Store Figure", state:"NY", rendererState:"MA", type:"furniture",  desc:"Carved & painted wood", renderer:"Alice Winchester, Boston MA", origin:"Lower Manhattan, NY", year:"1935" },
  { id:6, name:"Conestoga Wagon Toolbox", state:"PA", rendererState:"OH", type:"tool",  desc:"Wrought iron, painted pine", renderer:"Fritz Kredel, Cincinnati OH", origin:"Lancaster County, PA", year:"1936" },
  { id:7, name:"Majolica Pitcher", state:"NJ", rendererState:"PA", type:"ceramic",  desc:"Earthenware, polychrome glaze", renderer:"Perkins Harnly, Philadelphia PA", origin:"Trenton, NJ", year:"1940" },
  { id:8, name:"Coverlet", state:"OH", rendererState:"NY", type:"textile",  desc:"Wool & cotton, Jacquard loom", renderer:"Louis Raynaud, New York", origin:"Zoar Colony, OH", year:"1937" },
];

const stateCoords = {
  MA:{x:865,y:120}, NY:{x:820,y:140}, PA:{x:790,y:165}, NJ:{x:830,y:175},
  NC:{x:790,y:230}, OH:{x:750,y:175}, IL:{x:680,y:180}, GA:{x:740,y:255},
  NM:{x:480,y:310}, NE:{x:580,y:200}
};

const stateShapes = [
  {id:"MA",d:"M830,108 L880,108 L885,125 L870,130 L840,128 Z"},
  {id:"NY",d:"M780,128 L840,120 L855,140 L830,155 L795,155 L780,145 Z"},
  {id:"PA",d:"M768,155 L830,155 L832,178 L768,180 Z"},
  {id:"NJ",d:"M830,155 L848,155 L850,185 L833,188 L828,175 Z"},
  {id:"NC",d:"M730,220 L820,218 L825,238 L728,242 Z"},
  {id:"OH",d:"M710,162 L760,160 L762,190 L710,192 Z"},
  {id:"IL",d:"M648,165 L690,163 L692,205 L650,208 Z"},
  {id:"GA",d:"M718,240 L768,238 L770,275 L720,278 Z"},
  {id:"NM",d:"M438,288 L510,286 L514,335 L440,338 Z"},
  {id:"TX",d:"M490,320 L600,318 L598,390 L492,392 Z"},
  {id:"CA",d:"M310,200 L355,185 L365,310 L308,315 Z"},
  {id:"FL",d:"M740,320 L790,318 L795,370 L745,372 Z"},
  {id:"MN",d:"M600,110 L650,108 L652,158 L602,160 Z"},
  {id:"WI",d:"M660,118 L700,116 L702,162 L662,164 Z"},
  {id:"MI",d:"M710,120 L750,118 L752,155 L712,157 Z"},
  {id:"IN",d:"M690,163 L715,161 L717,198 L692,200 Z"},
  {id:"KY",d:"M700,200 L770,198 L772,225 L702,228 Z"},
  {id:"TN",d:"M680,228 L780,225 L782,248 L682,252 Z"},
  {id:"VA",d:"M778,200 L840,198 L844,222 L780,225 Z"},
];

let selectedObj = null;
let activeFilter = 'all';

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderList();
  clearConnections();
}

function renderList() {
  const list = document.getElementById('object-list');
  const filtered = activeFilter === 'all' ? objects : objects.filter(o => o.type === activeFilter);
  list.innerHTML = filtered.map(o => `
    <div class="object-item ${selectedObj === o.id ? 'selected':''}" onclick="selectObject(${o.id})">
      <div style="display:flex;gap:10px;align-items:flex-start">
        <div class="object-thumb">${o.emoji}</div>
        <div class="object-meta">
          <div class="object-name">${o.name}</div>
          <div class="object-sub">Origin: ${o.origin.split(',')[0]}</div>
          <span class="tag">${o.type}</span>
          <span class="tag render">rendered in ${o.rendererState}</span>
        </div>
      </div>
    </div>
  `).join('');
  updateStateHighlights(filtered);
}

function updateStateHighlights(filtered) {
  const statesWithObjects = new Set(filtered.map(o => o.state));
  document.querySelectorAll('.state-path').forEach(p => {
    p.classList.remove('has-objects','highlighted');
    if (statesWithObjects.has(p.id)) p.classList.add('has-objects');
  });
}

function selectObject(id) {
  selectedObj = id;
  const obj = objects.find(o => o.id === id);
  renderList();
  showConnection(obj);
}

function showConnection(obj) {
  clearConnections();
  const connLayer = document.getElementById('connections-layer');
  const dotsLayer = document.getElementById('dots-layer');

  const oc = stateCoords[obj.state];
  const rc = stateCoords[obj.rendererState];

  document.querySelectorAll('.state-path').forEach(p => {
    p.classList.remove('highlighted');
    if (p.id === obj.state || p.id === obj.rendererState) p.classList.add('highlighted');
  });

  if (oc && rc && obj.state !== obj.rendererState) {
    const line = document.createElementNS('http://www.w3.org/2000/svg','path');
    const cx = (oc.x + rc.x)/2;
    const cy = Math.min(oc.y, rc.y) - 40;
    line.setAttribute('d', `M${rc.x},${rc.y} Q${cx},${cy} ${oc.x},${oc.y}`);
    line.setAttribute('class','connection-line');
    connLayer.appendChild(line);
  }

  if (oc) {
    const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
    dot.setAttribute('cx', oc.x); dot.setAttribute('cy', oc.y);
    dot.setAttribute('r','7'); dot.setAttribute('fill','#7F77DD');
    dot.setAttribute('stroke','#fff'); dot.setAttribute('stroke-width','2');
    dotsLayer.appendChild(dot);
  }
  if (rc) {
    const dot2 = document.createElementNS('http://www.w3.org/2000/svg','circle');
    dot2.setAttribute('cx', rc.x); dot2.setAttribute('cy', rc.y);
    dot2.setAttribute('r','7'); dot2.setAttribute('fill','#AFA9EC');
    dot2.setAttribute('stroke','#fff'); dot2.setAttribute('stroke-width','2');
    dotsLayer.appendChild(dot2);
  }

  const panel = document.getElementById('info-panel');
  panel.classList.add('visible');
  document.getElementById('info-title').textContent = `${obj.emoji} ${obj.name} — ${obj.year}`;
  document.getElementById('info-sub').textContent = `${obj.desc} · Documented in ${obj.origin}`;
  const conn = obj.state !== obj.rendererState
    ? `Rendered by ${obj.renderer} — traveled from ${obj.rendererState} to document this object in ${obj.state}`
    : `Rendered by ${obj.renderer} — local to the object's origin`;
  document.getElementById('info-connection').innerHTML = `<span style="color:#534AB7">⬦</span> ${conn}`;
}

function clearConnections() {
  document.getElementById('connections-layer').innerHTML = '';
  document.getElementById('dots-layer').innerHTML = '';
  document.getElementById('info-panel').classList.remove('visible');
  document.querySelectorAll('.state-path').forEach(p => p.classList.remove('highlighted'));
}

function buildMap() {
  const statesLayer = document.getElementById('states-layer');
  stateShapes.forEach(s => {
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', s.d);
    path.setAttribute('class','state-path');
    path.setAttribute('id', s.id);
    path.addEventListener('click', () => {
      const stateObjs = objects.filter(o => o.state === s.id);
      if (stateObjs.length) selectObject(stateObjs[0].id);
    });
    statesLayer.appendChild(path);
  });
}

buildMap();
renderList();
</script>
